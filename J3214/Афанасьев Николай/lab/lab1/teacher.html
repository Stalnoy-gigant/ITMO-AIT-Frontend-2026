<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnFlow — Кабинет преподавателя</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="main-wrapper"> <div class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-4">
      <div style="width:36px;height:36px;background:#534AB7;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">LF</div>
      <span style="font-size:16px;font-weight:700;">LearnFlow</span>
    </div>
    <div class="nav-section">Преподаватель</div>
    <a class="nav-item active" href="teacher.html">📚 Мои курсы</a>
    <a class="nav-item" href="#">💬 Обсуждения</a>
    <a class="nav-item" href="#">📊 Аналитика</a>
    <div class="nav-section">Аккаунт</div>
    <a class="nav-item" href="dashboard.html">🎓 Кабинет студента</a>
    <a class="nav-item" href="settings.html">⚙️ Настройки</a>
  </div>

  <div class="main-content">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 style="font-size:24px;font-weight:700;color:#222;">Кабинет преподавателя</h1>
        <p style="font-size:14px;color:#888;margin:0;">Управление вашим образовательным контентом</p>
      </div>
      <button class="btn-purple" type="button" onclick="openModal()">+ Создать курс</button>
    </div>

    <div class="d-flex gap-3 mb-5">
      <div class="stat-card">
        <div style="font-size:12px;color:#888;">Активных студентов</div>
        <div class="stat-value">1,240</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#888;">Средний рейтинг</div>
        <div class="stat-value">4.9 ★</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#888;">Доход (мес)</div>
        <div class="stat-value">42,800 ₽</div>
      </div>
    </div>

    <div class="row g-3" id="courses-container">
      </div>
  </div> </div> <div id="createModal" class="modal-overlay">
  <div class="modal-box">
    <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;">Новый курс</h2>
    
    <label style="font-size:13px;font-weight:600;margin-bottom:5px;display:block;">Название курса</label>
    <input type="text" class="form-control-custom" placeholder="Например: JavaScript для начинающих">

    <label style="font-size:13px;font-weight:600;margin-bottom:5px;display:block;">Категория</label>
    <select class="form-control-custom">
      <option>Программирование</option>
      <option>Дизайн</option>
      <option>Математика</option>
    </select>

    <label style="font-size:13px;font-weight:600;margin-bottom:5px;display:block;">Уровень сложности</label>
    <select class="form-control-custom">
      <option>Начинающий</option>
      <option>Средний</option>
      <option>Продвинутый</option>
    </select>

    <div class="d-flex gap-2 mt-4">
      <button onclick="closeModal()" class="btn-action" style="flex:1; background:#eee; color:#333;">Отмена</button>
      <button onclick="saveNewCourse()" class="btn-purple" style="flex:2;">Создать курс</button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
