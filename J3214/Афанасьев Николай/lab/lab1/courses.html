<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnFlow — Каталог курсов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="main-wrapper">
  <div class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-4">
      <svg width="36" height="36" viewBox="0 0 56 56">
        <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7F77DD"/><stop offset="100%" stop-color="#3C3489"/></linearGradient></defs>
        <rect width="56" height="56" rx="14" fill="url(#g1)"/>
        <text x="9" y="38" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="1">LF</text>
      </svg>
      <span style="font-size:16px;font-weight:500;">LearnFlow</span>
    </div>
    
    <div class="nav-section">Главное</div>
    <a class="nav-item" href="dashboard.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Дашборд
    </a>
    <a class="nav-item active" href="courses.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Каталог курсов
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Мой прогресс
    </a>

    <div class="nav-section">Аккаунт</div>
    <a class="nav-item" href="settings.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Настройки
    </a>

    <div style="margin-top:auto;">
      <a class="nav-item" href="login.html" data-logout style="color:#E24B4A;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Выйти
      </a>
    </div>
  </div>

  <div class="main-content">
    <div style="margin-bottom:1.5rem;">
      <h1 class="page-title">Каталог курсов</h1>
      <p class="page-subtitle">Найдите курс, который подойдёт именно вам</p>
    </div>

    <div class="search-bar">
      <input class="search-input" type="text" id="searchInput" placeholder="Поиск по названию, теме или автору...">
      <select class="filter-select" id="filterSubject">
        <option value="">Все предметы</option>
        <option value="Программирование">Программирование</option>
        <option value="Дизайн">Дизайн</option>
        <option value="Математика">Математика</option>
        <option value="ML / AI">ML / AI</option>
        <option value="Базы данных">Базы данных</option>
      </select>
      <select class="filter-select" id="filterLevel">
        <option value="">Любой уровень</option>
        <option value="Начинающий">Начинающий</option>
        <option value="Средний">Средний</option>
        <option value="Продвинутый">Продвинутый</option>
      </select>
      <select class="filter-select" id="filterPrice">
        <option value="">Любая цена</option>
        <option value="free">Бесплатно</option>
        <option value="1000">До 1000 ₽</option>
        <option value="3000">До 3000 ₽</option>
      </select>
      <button class="btn-search" type="button" onclick="filterCourses()">Найти</button>
      <button class="btn-clear" type="button" id="clearFiltersBtn">Сброс</button>
    </div>

    <div class="results-info" id="resultsInfo">Загрузка…</div>

    <div class="row g-3" id="coursesGrid"></div>
  </div>
</div>
  <script src="js/main.js"></script>
</body>
</html>
